<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go / No-Go</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- ── Intro screen ───────────────────────────────────── -->
  <div id="screen-intro" class="screen screen--overlay">
    <h1 class="intro__title">Go / No-Go</h1>
    <p class="intro__desc">
      A ball will appear. <strong>Tap or press Space</strong> as fast as you can —
      but <strong>hold back</strong> if the ball is <span class="text--danger">red</span>.
    </p>
    <button class="btn" id="start-button">Start</button>
  </div>

  <!-- ── Game screen ────────────────────────────────────── -->
  <div id="screen-game" class="screen screen--game" hidden>
    <div class="ball" id="ball"></div>
    <div class="feedback" id="feedback" aria-live="polite" aria-atomic="true"></div>
  </div>

  <!-- ── Summary screen ────────────────────────────────── -->
  <div id="screen-summary" class="screen screen--overlay" hidden>
    <h2 class="summary__title">Results</h2>
    <dl class="stats" id="stats-list"></dl>
    <button class="btn" id="restart-button">Play again</button>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
